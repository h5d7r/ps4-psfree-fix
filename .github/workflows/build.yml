name: Build PSFree

on:
  push:
    branches: [ patch-2 ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: patch-2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils binutils-gold make git gcc

      - name: Clone libPS4
        run: |
          git clone https://github.com/idc/ps4-payload-sdk.git $HOME/PS4SDK

      - name: Patch libPS4 types conflict
        run: |
          sed -i 's/typedef uint32_t __dev_t;/\/\/ typedef uint32_t __dev_t;/' $HOME/PS4SDK/libPS4/include/types.h
          sed -i 's/typedef uint32_t __uid_t;/\/\/ typedef uint32_t __uid_t;/' $HOME/PS4SDK/libPS4/include/types.h
          sed -i 's/typedef uint32_t __gid_t;/\/\/ typedef uint32_t __gid_t;/' $HOME/PS4SDK/libPS4/include/types.h
          sed -i 's/typedef int32_t __pid_t;/\/\/ typedef int32_t __pid_t;/' $HOME/PS4SDK/libPS4/include/types.h

      - name: Patch syscall.s section directive
        run: |
          sed -i 's/\.section __TEXT,__text,regular,pure_instructions/.section .text/' $HOME/PS4SDK/libPS4/source/syscall.s
          sed -i 's/\.section __TEXT,__text/.section .text/' $HOME/PS4SDK/libPS4/source/syscall.s

      - name: Build libPS4
        run: |
          cd $HOME/PS4SDK/libPS4
          make

      - name: Build project
        run: |
          export PS4SDK=$HOME/PS4SDK
          make

      - name: Upload BIN artifact
        uses: actions/upload-artifact@v4
        with:
          name: psfree-bin
          path: "*.bin"
          retention-days: 30
