name: Build PSFree

on:
  push:
    branches: [ patch-2 ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: patch-2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc binutils-gold make git

      - name: Clone libPS4
        run: |
          git clone https://github.com/idc/ps4-payload-sdk.git $HOME/PS4SDK
          cd $HOME/PS4SDK/libPS4
          make

      - name: Build
        run: |
          export PS4SDK=$HOME/PS4SDK
          make

      - name: Upload BIN artifact
        uses: actions/upload-artifact@v4
        with:
          name: psfree-bin
          path: "*.bin"
          retention-days: 30
