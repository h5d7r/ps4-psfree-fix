name: Build PSFree

on:
  push:
    branches: [ patch-2 ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: patch-2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils make git gcc

      - name: Clone libPS4
        run: |
          git clone https://github.com/idc/ps4-payload-sdk.git $HOME/PS4SDK

      - name: Patch libPS4 types conflict
        run: |
          sed -i 's/typedef uint32_t __dev_t;/\/\/ typedef uint32_t __dev_t;/' $HOME/PS4SDK/libPS4/include/types.h
          sed -i 's/typedef uint32_t __uid_t;/\/\/ typedef uint32_t __uid_t;/' $HOME/PS4SDK/libPS4/include/types.h
          sed -i 's/typedef uint32_t __gid_t;/\/\/ typedef uint32_t __gid_t;/' $HOME/PS4SDK/libPS4/include/types.h
          sed -i 's/typedef int32_t __pid_t;/\/\/ typedef int32_t __pid_t;/' $HOME/PS4SDK/libPS4/include/types.h

      - name: Patch syscall.s section directive
        run: |
          sed -i 's/\.section \.sc_rop,"wb"/.section .sc_rop,"w"/' $HOME/PS4SDK/libPS4/source/syscall.s

      - name: Build libPS4
        run: |
          cd $HOME/PS4SDK/libPS4
          make

      - name: Build project
        run: |
          export PS4SDK=$HOME/PS4SDK
          
          printf '#include <stddef.h>\n#define UNUSED(x) (void)(x)\nstruct thread;\nvoid jailbreak(){}\nvoid initSysUtil(){}\nvoid printf_notification(const char* fmt, ...){}\nvoid get_firmware_string(char* fw){}\nunsigned char* base64_decode(const char* d, size_t l, size_t* o){return 0;}\n' > source/stubs.h
          printf '#include "stubs.h"\n' | cat - source/main.c > source/main_fixed.c && mv source/main_fixed.c source/main.c

          cat << 'EOF' > Makefile
          CC := gcc
          OBJCOPY := objcopy
          CFLAGS := -I$(PS4SDK)/libPS4/include -Iinclude -Isource -Os -std=c11 -ffunction-sections -fdata-sections -fno-builtin -nostartfiles -nostdlib -Wall -Wextra -masm=intel -march=btver2 -mtune=btver2 -m64 -mabi=sysv -mcmodel=small -fpie -fPIC
          LDFLAGS := -L$(PS4SDK)/libPS4 -Xlinker -T $(PS4SDK)/libPS4/linker.x -Xlinker -Map="ps4-psfree-fix.map" -Wl,--build-id=none -Wl,--gc-sections -lPS4
          
          all: ps4-psfree-fix.bin

          ps4-psfree-fix.bin: build/main.o
          	$(CC) $(PS4SDK)/libPS4/crt0.s build/main.o -o temp.t $(CFLAGS) $(LDFLAGS)
          	$(OBJCOPY) -O binary temp.t ps4-psfree-fix.bin
          	rm -f temp.t

          build/main.o: source/main.c
          	@mkdir -p build
          	$(CC) -c -o $@ $< $(CFLAGS)
          EOF
          
          make

      - name: Upload BIN artifact
        uses: actions/upload-artifact@v4
        with:
          name: psfree-bin
          path: "*.bin"
          retention-days: 30
