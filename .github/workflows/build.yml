name: Build PSFree

on:
  push:
    branches: [ patch-2 ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: patch-2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Package output as BIN
        run: |
          mkdir -p dist_bin
          find dist -type f | sort > dist_bin/file_list.txt
          tar -cf dist_bin/psfree.bin -C dist .

      - name: Upload BIN artifact
        uses: actions/upload-artifact@v4
        with:
          name: psfree-bin
          path: dist_bin/psfree.bin
          retention-days: 30
